<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英檢口說小教室</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#EAF6FF;
  --ink:#1E3A5F;
  --sun:#FFD24D;
  --coral:#FF7A6B;
  --mint:#43C79E;
  --card:#FFFFFF;
  --line:#CBE4F5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Nunito','Microsoft JhengHei','PingFang TC',sans-serif;
  background:var(--sky);
  background-image:radial-gradient(circle at 15% 20%, #D6EEFF 0 120px, transparent 121px),
                   radial-gradient(circle at 85% 75%, #DFF6EE 0 150px, transparent 151px);
  color:var(--ink);
  min-height:100vh;
  display:flex;justify-content:center;
}
.app{width:100%;max-width:520px;padding:20px 18px 40px;}
h1,h2,.eng{font-family:'Fredoka','Microsoft JhengHei',sans-serif;}

/* ---------- 首頁 ---------- */
.home-head{text-align:center;margin:18px 0 6px;}
.home-head .mascot{font-size:52px;display:block;animation:bob 2.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-head h1{font-size:30px;font-weight:700;letter-spacing:1px;}
.home-head p{font-size:14px;color:#5A7A9A;margin-top:4px;}
.star-row{display:flex;justify-content:center;gap:10px;align-items:center;margin:14px 0 18px;flex-wrap:wrap;}
.star-bank{
  background:var(--card);border:2px solid var(--sun);
  border-radius:999px;padding:6px 18px;font-weight:800;font-size:15px;
}
.btn-history{
  background:var(--card);border:2px solid var(--line);border-radius:999px;
  padding:6px 16px;font-weight:800;font-size:14px;cursor:pointer;color:#3E6488;font-family:inherit;
}
.modes{display:flex;flex-direction:column;gap:12px;}
.mode-card{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:2px solid var(--line);
  border-radius:20px;padding:14px 18px;cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
  text-align:left;width:100%;font-family:inherit;color:inherit;
}
.mode-card:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--line);}
.mode-card:active{transform:translateY(1px);box-shadow:none;}
.mode-card .icon{
  width:50px;height:50px;border-radius:16px;flex:none;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  background:var(--sky);
}
.mode-card.exam{border-color:var(--sun);background:#FFFBEE;}
.mode-card.exam .icon{background:var(--sun);}
.mode-card b{font-size:17px;display:block;}
.mode-card span{font-size:12.5px;color:#5A7A9A;line-height:1.5;}
.tip{
  margin-top:20px;font-size:12.5px;color:#5A7A9A;line-height:1.7;
  background:#FFFFFFAA;border-radius:14px;padding:12px 14px;
}

/* ---------- 練習頁 ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.btn-back{
  background:var(--card);border:2px solid var(--line);border-radius:12px;
  padding:7px 14px;font-weight:800;font-size:14px;cursor:pointer;color:var(--ink);font-family:inherit;
}
.progress{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.dot{width:11px;height:11px;border-radius:50%;background:#C9DFF0;}
.dot.done{background:var(--mint);}
.dot.now{background:var(--sun);outline:3px solid #FFE9A8;}

.stage{background:var(--card);border:2px solid var(--line);border-radius:24px;padding:22px 20px;text-align:center;}
.stage .part-tag{
  display:inline-block;font-size:12.5px;font-weight:800;letter-spacing:1px;
  background:var(--sky);border-radius:999px;padding:4px 14px;margin-bottom:10px;color:#3E6488;
}
.stage .part-tag.exam-tag{background:var(--sun);color:var(--ink);}
.prompt-zh{font-size:13.5px;color:#5A7A9A;margin-bottom:10px;line-height:1.6;}
.eng{font-size:23px;font-weight:600;line-height:1.5;margin:6px 0 4px;min-height:36px;}
.eng.small{font-size:18px;}
.eng.passage{font-size:17px;text-align:left;line-height:1.8;}
.eng .w{transition:color .2s;}
.eng .hit{color:var(--mint);}
.eng .miss{color:#B9C9D8;}
.hidden-q{
  font-size:15px;color:#8FA9C0;background:var(--sky);
  border-radius:12px;padding:12px;margin:6px 0;font-weight:700;line-height:1.7;
}
.hidden-q.playing{color:#3E6488;background:#FFF6DC;}
.hidden-q.yourturn{color:#1E7A5C;background:#D8F3E9;}

.timer{
  display:none;margin:10px auto 0;width:fit-content;
  font-size:20px;font-weight:800;color:#C0392B;
  background:#FFE9E5;border-radius:999px;padding:4px 18px;
}
.timer.show{display:block;}
.timer.calm{color:#3E6488;background:var(--sky);}

.controls{display:flex;justify-content:center;gap:26px;margin:18px 0 6px;align-items:flex-start;}
.ctrl{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:13px;font-weight:800;color:#3E6488;}
.round-btn{
  width:70px;height:70px;border-radius:50%;border:none;cursor:pointer;
  font-size:29px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 0 rgba(0,0,0,.12);transition:transform .1s;
}
.round-btn:active{transform:translateY(3px);box-shadow:none;}
.btn-listen{background:var(--sun);}
.btn-mic{background:var(--coral);width:86px;height:86px;font-size:36px;}
.btn-mic.rec{animation:pulse 1s infinite;background:#FF5546;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,85,70,.45),0 5px 0 rgba(0,0,0,.12);}
  70%{box-shadow:0 0 0 22px rgba(255,85,70,0),0 5px 0 rgba(0,0,0,.12);}
  100%{box-shadow:0 0 0 0 rgba(255,85,70,0),0 5px 0 rgba(0,0,0,.12);}
}
.round-btn:disabled{opacity:.45;cursor:default;}

.heard{
  min-height:44px;margin-top:10px;font-size:15px;color:#3E6488;
  background:var(--sky);border-radius:14px;padding:10px 14px;line-height:1.6;
}
.heard b{color:var(--ink);}

.feedback{margin-top:14px;min-height:40px;}
.stars{font-size:34px;letter-spacing:4px;}
.stars .off{opacity:.22;}
.fb-msg{font-size:16px;font-weight:800;margin-top:4px;}
.fb-sub{font-size:13px;color:#5A7A9A;margin-top:2px;}
.playback-row{display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.btn-play{
  background:#E4E0FF;color:#4B3FA8;border:none;border-radius:999px;
  padding:8px 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
}
.btn-play:disabled{opacity:.4;cursor:default;}
.btn-play.demo{background:#FFF1C9;color:#8A6400;}

/* ---------- 批改報告 ---------- */
.report{
  margin-top:14px;text-align:left;background:var(--sky);
  border-radius:16px;padding:14px 16px;font-size:14px;line-height:1.8;
}
.report .rep-title{font-weight:800;font-size:15px;margin-bottom:6px;}
.rep-row{margin-top:6px;}
.rep-label{font-size:12.5px;font-weight:800;color:#5A7A9A;display:block;margin-bottom:4px;}
.chip{
  display:inline-block;background:#FFE0DC;color:#C0392B;border:none;
  border-radius:999px;padding:4px 12px;margin:2px 4px 2px 0;
  font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
}
.chip.gray{background:#E3EDF5;color:#5A7A9A;cursor:default;}
.chip.mint{background:#D8F3E9;color:#1E7A5C;cursor:default;}
.check-line{font-size:14px;font-weight:700;margin-top:4px;}
.check-line.ok{color:#1E7A5C;}
.check-line.no{color:#C0392B;}
.sample-box{
  margin-top:8px;background:#fff;border:2px dashed var(--line);
  border-radius:12px;padding:8px 12px;font-size:14.5px;
}
.sample-box .btn-say{
  background:var(--sun);border:none;border-radius:999px;padding:2px 10px;
  font-size:13px;cursor:pointer;font-family:inherit;font-weight:800;margin-left:6px;
}

.next-row{display:flex;justify-content:center;gap:12px;margin-top:16px;flex-wrap:wrap;}
.btn-main{
  background:var(--mint);color:#fff;border:none;border-radius:16px;
  padding:12px 30px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 0 #2FA07C;
}
.btn-main:active{transform:translateY(3px);box-shadow:none;}
.btn-ghost{
  background:var(--card);color:var(--ink);border:2px solid var(--line);border-radius:16px;
  padding:11px 22px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
}
.qpick{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
.qpick-btn{
  background:var(--sky);color:#3E6488;border:2px solid var(--line);border-radius:999px;
  padding:9px 16px;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;
}
.qpick-btn:active{background:var(--sun);}

/* ---------- 準備時間頁（朗讀） ---------- */
.prep-list{
  text-align:left;font-size:16px;line-height:1.9;margin-top:12px;
  font-family:'Fredoka','Microsoft JhengHei',sans-serif;
}
.prep-list .no{display:inline-block;width:56px;font-weight:700;color:#3E6488;}
.prep-list .pss{
  display:block;background:var(--sky);border-radius:12px;padding:10px 14px;
  margin-top:8px;font-size:15px;line-height:1.8;
}

/* ---------- 自我介紹 ---------- */
.intro-sent{
  font-size:19px;font-family:'Fredoka','Microsoft JhengHei',sans-serif;
  background:var(--sky);border:2px solid #B8D9F0;border-radius:16px;
  padding:16px 18px;line-height:2;margin:8px 0;
}
.intro-sent u{
  text-decoration:none;border-bottom:2px solid var(--coral);
  font-weight:700;color:#C0392B;padding:0 4px;letter-spacing:2px;
}

/* ---------- 批改總表 / 成績單 ---------- */
.summary{
  margin-top:20px;text-align:left;background:var(--card);
  border:2px solid var(--line);border-radius:18px;padding:16px;
}
.summary h3{font-size:16px;margin-bottom:10px;text-align:center;}
.sum-item{
  border-bottom:1px dashed var(--line);padding:8px 0;font-size:13.5px;line-height:1.7;
}
.sum-item:last-child{border-bottom:none;}
.sum-q{font-weight:800;}
.sum-stars{float:right;font-size:13px;}
.sum-said{color:#5A7A9A;}
.sum-part-title{
  font-weight:800;font-size:14px;background:var(--sky);
  border-radius:8px;padding:4px 10px;margin:10px 0 4px;
}
.weak-box{margin-top:14px;background:#FFF6E0;border-radius:14px;padding:12px 14px;text-align:left;}
.weak-box b{display:block;font-size:14px;margin-bottom:6px;}
.part-score{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--sky);border-radius:12px;padding:10px 14px;margin-top:8px;
  font-size:14.5px;font-weight:800;
}
.part-score .ps-stars{color:#B8860B;}

/* ---------- 結算頁 ---------- */
.finish{text-align:center;padding-top:30px;}
.finish .big{font-size:70px;animation:bob 2s ease-in-out infinite;}
.finish h2{font-size:26px;margin:10px 0 6px;}
.finish p{color:#5A7A9A;font-size:15px;margin-bottom:20px;}

/* ---------- 進步紀錄 ---------- */
.hist-stats{
  display:flex;gap:10px;margin-bottom:14px;
}
.hist-stat{
  flex:1;background:var(--card);border:2px solid var(--line);
  border-radius:16px;padding:12px 8px;text-align:center;
}
.hist-stat b{font-size:22px;display:block;font-family:'Fredoka',sans-serif;}
.hist-stat span{font-size:12px;color:#5A7A9A;}
.hist-item{
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:10px 14px;margin-bottom:8px;font-size:13.5px;line-height:1.7;text-align:left;
}
.hist-item .hi-date{font-size:12px;color:#8FA9C0;}
.hist-item .hi-title{font-weight:800;}
.hist-item .hi-stars{float:right;font-weight:800;color:#B8860B;}
.hist-item.exam-rec{border-color:var(--sun);background:#FFFBEE;}
.hist-empty{
  text-align:center;color:#8FA9C0;font-size:14px;padding:30px 0;line-height:1.8;
}

.warn{
  margin-top:16px;font-size:13px;color:#A4552F;background:#FFF0E3;
  border-radius:14px;padding:12px 14px;line-height:1.7;display:none;
}
@media (prefers-reduced-motion: reduce){
  .home-head .mascot,.finish .big,.btn-mic.rec{animation:none;}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ================= 各部分的名稱與說明 ================= */
var BANK = {
  exam: {
    name:"正式模擬考", tag:"正式模擬考", icon:"🏁",
    desc:"自我介紹 → 複誦 → 朗讀 → 回答問題，一次考完不能重來"
  },
  intro: {
    name:"自我介紹", tag:"考試開始 · 自我介紹", icon:"🪪",
    desc:"考試一開始，請在 15 秒內唸出座位號碼和准考證號碼"
  },
  repeat: {
    name:"第一部分 複誦", tag:"第一部分 · 複誦", icon:"👂",
    desc:"題目會播兩次，聽完後請馬上複誦一次"
  },
  read: {
    name:"第二部分 朗讀句子與短文", tag:"第二部分 · 朗讀句子與短文", icon:"📖",
    desc:"看著句子朗讀，全部 6 題要在 1 分鐘內唸完"
  },
  answer: {
    name:"第三部分 回答問題", tag:"第三部分 · 回答問題", icon:"💬",
    desc:"題目播兩次後馬上回答，盡量把 15 秒講好講滿！"
  }
};

/* =====================================================================
   題庫：以「回」為單位（像模擬試題本的 第一回、第二回…）
   ➤ 新增一回的方法：複製一整個 { name:"..." ... } 區塊，
     貼在最後一回的 }, 後面，改題目內容即可，首頁會自動出現新的一回。
   每一回固定包含：
   - repeat：複誦 5 句
   - read：朗讀 sentences 5 句 + passage 1 篇短文
   - answer：回答問題 7 題（q=題目、sample=參考答案、keys=批改關鍵字）
   ===================================================================== */
var ROUNDS = [
  { /* ---------------- 第一回（課本題目） ---------------- */
    name:"第一回",
    repeat:[
      "You are my best friend.",
      "Can I borrow your pen?",
      "Do you want some bread for breakfast?",
      "He doesn't play basketball.",
      "What time do you get up every day?"
    ],
    read:{
      sentences:[
        "We often have a barbecue at the beach in summer.",
        "He doesn't like spicy food at all.",
        "Do you know how to bake a cake by yourself?",
        "I saw a beautiful sunset while I was walking by the river.",
        "Can you help me carry these heavy boxes?"
      ],
      passage:"I love pizza because it's so tasty and easy to eat. My favorite kind of pizza has cheese and mushrooms. I usually eat it with my family on weekends. We sometimes make our own pizza at home. It's fun to choose the toppings and cook together. Pizza always makes me feel happy."
    },
    answer:[
      {q:"What do you usually do on weekends?", sample:"I usually play basketball with my friends on weekends. Sometimes I watch TV and read comic books at home. It is a lot of fun.", keys:["i usually","i play","i watch","i go","i read","i relax","weekend","homework","hiking","sports"]},
      {q:"Where do you like to go shopping?", sample:"I like to go shopping at the supermarket with my mom, because there are many snacks and drinks. We go there every weekend.", keys:["i like","shopping","supermarket","department store","mall","night market","market","online","store","shop"]},
      {q:"What do you like to eat for breakfast?", sample:"I like to eat toast and eggs for breakfast, and I drink milk. It is yummy and it makes me strong.", keys:["i like","i eat","i have","toast","bread","egg","milk","sandwich","rice","cereal","pancake","soup","juice"]},
      {q:"Do you like to exercise?", sample:"Yes, I do. I like to play basketball after school with my friends, because it is fun and good for my body.", keys:["yes","no","i like","i love","i play","basketball","run","jog","swim","walk","exercise","don't"]},
      {q:"What do you usually do after work or school?", sample:"After school, I do my homework first. Then I watch TV or play games to relax. Sometimes I play with my dog.", keys:["after school","i do","homework","i watch","i play","i read","i go","i meet","games","tv"]},
      {q:"How do you usually get to work or school?", sample:"I usually go to school by bus with my sister. It takes about ten minutes, and I like to look out the window.", keys:["by bus","by car","by bike","by mrt","by subway","on foot","i walk","scooter","i take","i ride","i go"]},
      {q:"What do you like to do when it rains?", sample:"When it rains, I like to stay at home and read books. Sometimes I watch movies and drink hot chocolate. It feels cozy.", keys:["when it rains","i like","i stay","i read","i watch","i listen","i play","at home","inside","movies","music"]}
    ]
  },
  { /* ---------------- 第二回（課本題目） ---------------- */
    name:"第二回",
    repeat:[
      "Could you do me a favor?",
      "Make yourself at home.",
      "Let's keep in touch.",
      "It's very nice of you to help me.",
      "Let me introduce myself."
    ],
    read:{
      sentences:[
        "Why don't we hang out at the park this afternoon?",
        "If you're free, why don't we grab a bite to eat?",
        "Don't forget to call me back when you get home.",
        "You can count on me if you ever need help.",
        "Hold on a second. I'll be right back."
      ],
      passage:"I think learning English is very important. It helps me talk to people from other countries and understand different cultures. I like to practice English by watching movies and reading books. Sometimes, I talk to my friends in English. I hope one day I can speak it fluently and travel around the world."
    },
    answer:[
      {q:"When is your birthday?", sample:"My birthday is on May tenth. Every year, I eat cake with my family, and my friends give me presents. I love my birthday.", keys:["birthday is","born","january","february","march","april","may","june","july","august","september","october","november","december","cake","party"]},
      {q:"Do you enjoy learning English? Why or why not?", sample:"Yes, I like learning English, because it is fun and useful. I can watch cartoons in English and talk to people from other countries.", keys:["yes","no","i like","i enjoy","i love","english","because","fun","useful","difficult","hard"]},
      {q:"How many people are there in your family? Who are they?", sample:"There are four people in my family: my father, my mother, my brother, and me. We often watch TV and play games together.", keys:["there are","people","family","father","mother","brother","sister","grandma","grandpa","grandmother","grandfather","parents","dad","mom"]},
      {q:"Have you ever been abroad?", sample:"Yes, I have been to Japan with my family. We ate sushi and visited many fun places. I want to go there again.", keys:["yes","no","i have been","never","abroad","japan","korea","america","i would","want to go","i went"]},
      {q:"What kind of sport do you like to play?", sample:"I like to play basketball with my friends after school, because it is exciting. It also keeps me healthy and strong.", keys:["i like","i play","i love","basketball","badminton","swim","soccer","baseball","dodge ball","run","jog","sport","tennis"]},
      {q:"Do you have a lucky number? What is it?", sample:"Yes, my lucky number is seven, because my birthday is on July seventh. I think it brings me good luck.", keys:["yes","no","lucky number","number is","one","two","three","four","five","six","seven","eight","nine","don't have","because"]},
      {q:"Are you a shy or outgoing person?", sample:"I am an outgoing person. I like to talk to people and make new friends, because it is fun to play together.", keys:["i am","i'm","shy","outgoing","quiet","introverted","friendly","friends","person","i like to talk"]}
    ]
  },
  { /* ---------------- 第三回（課本題目） ---------------- */
    name:"第三回",
    repeat:[
      "It's getting hotter and hotter.",
      "Come on in and have a seat.",
      "Do you understand what I said?",
      "We're looking forward to the trip.",
      "It's a pleasure to meet you."
    ],
    read:{
      sentences:[
        "Mom is trying to learn how to bake a chocolate cake.",
        "Give me some time, and I'll think about it.",
        "Don't worry; everything will be fine.",
        "Let's catch up over coffee when you have free time.",
        "I haven't made up my mind yet."
      ],
      passage:"Last Saturday, my family and I went to the beach. The weather was warm, and the sky was clear. We played in the sand and built a big sandcastle. After that, we swam in the sea for a while. It was so relaxing and fun. I hope we can go there again soon."
    },
    answer:[
      {q:"Do you love outdoor activities?", sample:"Yes, I do. I like to ride my bike and play in the park with my friends, because I love the fresh air and sunshine.", keys:["yes","no","i like","i love","i enjoy","outdoor","bike","hiking","camping","park","play","indoors","i prefer","jogging","picnic"]},
      {q:"What's the first thing you do after you wake up?", sample:"The first thing I do is brush my teeth and wash my face. Then I eat breakfast with my family before I go to school.", keys:["first thing","i brush","i wash","i drink","i check","i eat","i stay","teeth","face","water","get dressed","bed","phone"]},
      {q:"Have you ever shopped online?", sample:"Yes, I have. My mom and I buy books and toys online, because it is fast and easy. The things come to our home.", keys:["yes","no","i have","never","online","i buy","i bought","books","clothes","toys","store","haven't","convenient"]},
      {q:"Do you like to go to night markets?", sample:"Yes, I like night markets very much, because there are many yummy snacks. I love fried chicken and bubble tea, and the games are fun.", keys:["yes","no","i like","i love","night market","snacks","food","crowded","bubble tea","games","don't","street food"]},

var audioStream=null, mediaRec=null, recChunks=[], lastAudioURL=null, playbackAudio=null;
// Android 的 Google 語音辨識和網頁錄音不能同時使用麥克風（會出現 cannot record now as Chrome is recording）
// 所以在行動裝置上直接停用錄音回放，確保語音辨識一定能用；電腦上兩者可並存，回放功能保留
var recorderDisabled = /Android|iPhone|iPad/i.test(navigator.userAgent);
function releaseStream(){
  try{
    if(audioStream){
      var tracks=audioStream.getTracks();
      for(var i=0;i<tracks.length;i++){ tracks[i].stop(); }
    }
  }catch(e){}
  audioStream=null;
}
function startRecorder(){
  if(recorderDisabled) return;
  if(!navigator.mediaDevices || !window.MediaRecorder) return;
  var go=function(){
    try{
      recChunks=[];
      mediaRec=new MediaRecorder(audioStream);
      mediaRec.ondataavailable=function(e){ if(e.data && e.data.size>0){ recChunks.push(e.data); } };
      mediaRec.onstop=function(){
        try{
          if(lastAudioURL){ URL.revokeObjectURL(lastAudioURL); lastAudioURL=null; }
          if(recChunks.length>0){
            var blob=new Blob(recChunks,{type: mediaRec.mimeType||"audio/webm"});
            lastAudioURL=URL.createObjectURL(blob);
            var pb=document.getElementById("myrec");
            if(pb){ pb.disabled=false; }
          }
        }catch(e){}
      };
      mediaRec.start();
    }catch(e){}
  };
  if(audioStream && audioStream.active){ go(); }
  else{
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
      audioStream=s; go();
    }).catch(function(){ /* 拿不到就沒有回放功能，不影響辨識 */ });
  }
}
function stopRecorder(){
  if(mediaRec && mediaRec.state!=="inactive"){ try{ mediaRec.stop(); }catch(e){} }
}
function playRecording(){
  if(!lastAudioURL) return;
  try{
    window.speechSynthesis.cancel();
    if(playbackAudio){ playbackAudio.pause(); }
    playbackAudio=new Audio(lastAudioURL);
    playbackAudio.play();
  }catch(e){}
}

/* ================= 比對與計分 ================= */
function normWords(s){
  return s.toLowerCase().replace(/[^a-z0-9' ]+/g," ").split(/\s+/).filter(function(w){return w.length>0;});
}
// 縮寫對照表：兩個字的形式 → 收合後的形式（撇號已去除）
// 讓「題目寫 I will、小朋友說 I'll」或反過來都能互相匹配
var CONTR=[
  ["do","not","dont"],["does","not","doesnt"],["did","not","didnt"],
  ["is","not","isnt"],["are","not","arent"],["was","not","wasnt"],["were","not","werent"],
  ["can","not","cant"],["could","not","couldnt"],["will","not","wont"],["would","not","wouldnt"],
  ["have","not","havent"],["has","not","hasnt"],["had","not","hadnt"],
  ["it","is","its"],["that","is","thats"],["there","is","theres"],["what","is","whats"],
  ["time","is","times"],["he","is","hes"],["she","is","shes"],
  ["i","am","im"],["i","will","ill"],["i","would","id"],["i","have","ive"],
  ["we","will","well"],["we","have","weve"],["you","will","youll"],
  ["you","are","youre"],["they","are","theyre"],["let","us","lets"]
];
// 把連續兩個字收合成縮寫；回傳 tokens 與每個 token 對應幾個原始單字（span）
function collapseTokens(arr){
  var out=[], span=[];
  for(var i=0;i<arr.length;i++){
    var merged=null;
    if(i+1<arr.length){
      for(var c=0;c<CONTR.length;c++){
        if(arr[i]===CONTR[c][0] && arr[i+1]===CONTR[c][1]){ merged=CONTR[c][2]; break; }
      }
    }
    if(merged){ out.push(merged); span.push(2); i++; }
    else{
      out.push(arr[i]==="cannot" ? "cant" : arr[i]);
      span.push(1);
    }
  }
  return { t:out, span:span };
}
// 目標句：依「畫面上的單字」逐字正規化（維持一對一對應），再做縮寫收合
function prepTarget(target){
  var tRaw = target.replace(/:/g,"").replace(/[.,!?;]/g,"").split(/\s+/).filter(function(w){return w.length>0;});
  var base=[];
  for(var i=0;i<tRaw.length;i++){
    base.push(tRaw[i].toLowerCase().replace(/[^a-z0-9']/g,"").replace(/'/g,""));
  }
  var c=collapseTokens(base);
  return { tRaw:tRaw, tokens:c.t, span:c.span };
}
// 小朋友說的話：同樣正規化＋縮寫收合（3:30 之類的時間會變成 330 對齊）
function tokSaid(s){
  var base=normWords(s.replace(/:/g,""));
  for(var i=0;i<base.length;i++){ base[i]=base[i].replace(/'/g,""); }
  return collapseTokens(base).t;
}
// 最長共同子序列（LCS）：唸的字必須「照正確順序」出現才算對，
// 亂湊字、跳著講不會得分；中間多講幾個字則不扣分
function scoreRepeat(target, said){
  var tp=prepTarget(target);
  var t=tp.tokens, s=tokSaid(said);
  var n=t.length, m=s.length;
  var dp=[], i, j;
  for(i=0;i<=n;i++){
    dp.push([]);
    for(j=0;j<=m;j++){ dp[i].push(0); }
  }
  for(i=1;i<=n;i++){
    for(j=1;j<=m;j++){
      if(t[i-1]===s[j-1]){ dp[i][j]=dp[i-1][j-1]+1; }
      else{ dp[i][j]=dp[i-1][j]>dp[i][j-1]?dp[i-1][j]:dp[i][j-1]; }
    }
  }
  var cMarks=[], usedSaid=[];
  for(i=0;i<n;i++){ cMarks.push(false); }
  for(j=0;j<m;j++){ usedSaid.push(false); }
  i=n; j=m;
  while(i>0 && j>0){
    if(t[i-1]===s[j-1] && dp[i][j]===dp[i-1][j-1]+1){
      cMarks[i-1]=true; usedSaid[j-1]=true; i--; j--;
    }else if(dp[i-1][j]>=dp[i][j-1]){ i--; }
    else{ j--; }
  }
  // 把收合後的比對結果展開回「畫面上的每個字」（縮寫佔兩個字就標兩個）
  var marks=[];
  for(i=0;i<n;i++){
    for(var k=0;k<tp.span[i];k++){ marks.push(cMarks[i]); }
  }
  var hit=0;
  for(i=0;i<marks.length;i++){ if(marks[i]) hit++; }
  var pct = marks.length ? hit/marks.length : 0;
  var stars = pct>=0.85 ? 3 : pct>=0.6 ? 2 : pct>0 ? 1 : 0;
  var missed=[];
  for(i=0;i<marks.length;i++){ if(!marks[i] && tp.tRaw[i]!==undefined) missed.push(tp.tRaw[i]); }
  var extra=[];
  for(j=0;j<m;j++){ if(!usedSaid[j]) extra.push(s[j]); }
  return {stars:stars, pct:pct, marks:marks, missed:missed, extra:extra};
}
function scoreAnswer(said, item){
  var lower = " "+said.toLowerCase().replace(/[^a-z0-9' ]+/g," ").replace(/\s+/g," ")+" ";
  var n = normWords(said).length;
  var full = n>=3;      // 完整句子：至少 3 個字
  var enough = n>=8;    // 講好講滿：至少 8 個字（大約兩句話）
  var onTopic = false;
  if(item && item.keys){
    for(var i=0;i<item.keys.length;i++){
      if(lower.indexOf(item.keys[i])>=0){ onTopic=true; break; }
    }
  }
  var stars = (enough&&onTopic) ? 3 : ((full&&onTopic)||enough) ? 2 : n>=1 ? 1 : 0;
  return {stars:stars, words:n, full:full, enough:enough, onTopic:onTopic};
}
function fbText(stars){
  if(stars===3) return ["太棒了！🎉","你唸得又清楚又完整！"];
  if(stars===2) return ["很好！👍","再多唸對幾個字就滿分囉！"];
  if(stars===1) return ["加油！💪","多聽幾次，再試一次！"];
  return ["沒關係，再來一次！🌈","靠近麥克風，大聲慢慢說。"];
}

    if(pt.results && pt.results.length){
      sumHtml+='<div class="sum-part-title">'+partNames[key]+'</div>';

            read:ex.parts.read?ex.parts.read.stars:0, answer:ex.parts.answer?ex.parts.answer.stars:0 },
    missed:weakList
  });
  h(

      '<p>'+esc(ROUNDS[ex.round].name)+' · 正式模擬考成績單<br>總分 <b>'+total+'</b> / '+totalMax+' 顆星星</p>'+

        '<button class="btn-main" id="home">回首頁</button>'+
      '</div>'+

  );

  document.getElementById("home").onclick=renderHome;

    c.onclick=function(){ speak(c.getAttribute("data-w"), 0.7); };

      });

function gradeReadAll(said){
  state.answered=true;
  hideTimer();
  var combined = state.qs.join(" ");
  var res = scoreRepeat(combined, said);
  // 依每題的字數把整體比對結果切回各題，逐題上色、給星、記漏字
  var ptr=0, partStars=0, weakSet={}, weakList=[];
  for(var i=0;i<state.qs.length;i++){
    var n = state.qs[i].trim().split(/\s+/).length; // 依畫面單字數切分（與 marks 對齊）
    var m = res.marks.slice(ptr, ptr+n);
    var hit=0;
    for(var a=0;a<m.length;a++){ if(m[a]) hit++; }
    var pct = n? hit/n : 0;
    var stars = pct>=0.85 ? 3 : pct>=0.6 ? 2 : pct>0 ? 1 : 0;
    var tRaw = state.qs[i].replace(/:/g,"").replace(/[.,!?;]/g,"").split(/\s+/).filter(function(w){return w.length>0;});
    var missed=[];
    for(var k=0;k<m.length;k++){
      if(!m[k]){
        missed.push(tRaw[k]);
        var wk=tRaw[k].toLowerCase();
        if(!weakSet[wk]){ weakSet[wk]=true; weakList.push(tRaw[k]); }
      }
    }
    // 上色
    var cont=document.querySelector('.rd-words[data-item="'+i+'"]');
    if(cont){
      var spans=cont.querySelectorAll(".w");
      for(var s2=0;s2<spans.length;s2++){ spans[s2].className="w "+(m[s2]?"hit":"miss"); }
    }
    state.results[i]={ q:state.qs[i], said:"", stars:stars, missed:missed };
    partStars+=stars;
    ptr+=n;
  }
  state.stars+=partStars; state.totalStars+=partStars; saveTotalStars();
  var overall = res.pct>=0.85 ? 3 : res.pct>=0.6 ? 2 : res.pct>0 ? 1 : 0;
  var msg=fbText(overall);
  var starHtml="";
  for(var s=0;s<3;s++){ starHtml+='<span class="'+(s<overall?"":"off")+'">⭐</span>'; }
  var repHtml='<div class="report"><div class="rep-title">📝 批改結果</div>';
  if(weakList.length===0){
    repHtml+='<span class="chip mint">🌟 全部唸對，沒有漏字！</span>';
  }else{
    repHtml+='<div class="rep-row"><span class="rep-label">要加強的字（點一下可以聽發音）：</span>';
    for(var w2=0;w2<weakList.length;w2++){
      repHtml+='<button class="chip miss-chip" data-w="'+esc(weakList[w2])+'">'+esc(weakList[w2])+' 🔊</button>';
    }
    repHtml+='</div>';
  }
  repHtml+='</div>';
  document.getElementById("fb").innerHTML=
    '<div class="stars">'+starHtml+'</div>'+
    '<div class="fb-msg">'+msg[0]+'</div>'+
    '<div class="fb-sub">整段唸對 '+Math.round(res.pct*100)+'% 的字 · 六題共得 '+partStars+' / '+(state.qs.length*3)+' 顆星（綠色是唸對的字）</div>'+
    repHtml;
  var chips=document.querySelectorAll(".miss-chip");
  Array.prototype.forEach.call(chips, function(c){
    c.onclick=function(){ speak(c.getAttribute("data-w"), 0.7); };
  });
  if(state.exam){
    document.getElementById("nextrow").innerHTML=
      '<button class="btn-main" id="next">進入第三部分 回答問題 →</button>';
    document.getElementById("next").onclick=function(){ examNextPart(); };
  }else{
    document.getElementById("nextrow").innerHTML=
      '<button class="btn-ghost" id="retry">再唸一次</button>'+
      '<button class="btn-main" id="next">看成績 🏁</button>';
    document.getElementById("retry").onclick=function(){
      state.stars-=partStars; state.totalStars-=partStars; saveTotalStars();
      state.results=[];
      renderReadAll();
    };
    document.getElementById("next").onclick=function(){ renderFinish(); };
  }
  if(overall===3){ speak("Great job!",1); } else if(overall>=1){ speak("Good try!",1); }
}

  }

    '<div class="topbar"><button class="btn-back" id="back">← '+(inExam?'放棄考試':'回首頁')+'</button><div class="progress">'+dots+'</div></div>'+
    '<div class="stage">'+
      '<span class="part-tag'+(inExam?' exam-tag':'')+'">'+tagText+'</span>'+
      '<div class="prompt-zh">'+m.desc+'</div>'+
      engHtml+
      '<div class="timer" id="timer"></div>'+

        listenHtml+

      '<div class="heard" id="heard">🦉 我在等你說話…</div>'+
      '<div class="feedback" id="fb"></div>'+
      '<div class="next-row" id="nextrow"></div>'+

  );

}
function setPlayStatus(text, yourturn){
  var el=document.getElementById("hiddenq");
  if(el){
    el.textContent=text;
    el.className="hidden-q "+(yourturn?"yourturn":"playing");
  }
}
function beginSpeaking(){
  startMicSession(function(){
    if(state.mode==="answer"){
      startTimer(ANSWER_SEC, "回答時間 剩下", false, function(){ stopMicManual(); });
    }
  });
}
function wordSpans(sentence){
  var parts = sentence.split(" "), out="";
  for(var i=0;i<parts.length;i++){ out+='<span class="w" data-i="'+i+'">'+esc(parts[i])+'</span> '; }
  return out;
}
function goHome(){ micManualStop=true; clearSilence(); hideTimer(); stopMic(); stopRecorder(); renderHome(); }

/* ================= 錄音流程（停頓續錄：安靜滿 4 秒才算講完） ================= */
var micAccum="", micManualStop=false, silenceTid=null, sessionTimerStarted=false, micSessionStart=0;
var SILENCE_MS=4000;         // 說過話之後，安靜這麼久才算真的講完
var FIRST_SILENCE_MS=10000;  // 完全沒開口的等待上限

function startMicSession(onStarted){
  micAccum=""; micManualStop=false; sessionTimerStarted=false;
  micSessionStart=Date.now();
  clearSilence();
  startMic(onStarted);
}
function clearSilence(){ if(silenceTid){ clearTimeout(silenceTid); silenceTid=null; } }
function armSilence(ms){
  clearSilence();
  silenceTid=setTimeout(function(){
    silenceTid=null;
    // 第三部分回答問題：安靜不算講完！鼓勵小朋友把 15 秒講好講滿
    if(state.mode==="answer" && !state.answered){
      var hd=document.getElementById("heard");
      if(hd && fullTranscript()){
        hd.innerHTML="🗣️ 我聽到：<b>"+esc(fullTranscript())+"</b><br><span style='color:#C0392B;font-weight:800;'>⏰ 還有時間！再多說一句，可以用 because… / and… / I also…</span>";
      }
      return; // 不結束，繼續錄到 15 秒滿或自己按 🎤
    }
    micManualStop=true;
    if(listening){ stopMic(); } else { finalizeSpeech(); }
  }, ms);
}
function fullTranscript(){ return (micAccum+" "+lastTranscript).trim(); }
function finalizeSpeech(){
  clearSilence();
  if(state.answered || state.screen!=="q") return;
  hideTimer();
  var full=fullTranscript();
  if(full){
    if(state.mode==="intro"){ gradeIntro(full); }
    else if(state.mode==="read"){ gradeReadAll(full); }
    else{ grade(full); }
  }else{
    var hd=document.getElementById("heard");
    if(hd){ hd.innerHTML="😅 沒有聽到聲音，按 🎤 再說一次！"; }
    if(state.mode==="read"){ state.readEndsAt=null; }
  }
}
function startMic(onStarted){
  recognition = initRecognition();
  if(!recognition){
    var w=document.getElementById("micwarn");
    if(w){ w.style.display="block"; }
    return;
  }
  var micBtn=document.getElementById("mic"), label=document.getElementById("miclabel"), heard=document.getElementById("heard");
  lastTranscript="";
  recognition.onstart=function(){
    if(state.answered || micManualStop){ try{recognition.stop();}catch(e){} return; }
    listening=true;
    if(micBtn){ micBtn.className="round-btn btn-mic rec"; }
    if(label){ label.textContent="正在聽…講完按一下結束"; }
    if(heard && !fullTranscript()){ heard.innerHTML="👂 我在聽！講完後<b>安靜一下</b>或按 🎤 就會批改"; }
    window.speechSynthesis && window.speechSynthesis.cancel();
    startRecorder(); // 同步開始錄音，供回放
    // 停頓偵測：還沒開口給 10 秒；說過話之後安靜 4 秒就自動結束批改
    armSilence(fullTranscript()? SILENCE_MS : FIRST_SILENCE_MS);
    if(onStarted && !sessionTimerStarted){ sessionTimerStarted=true; onStarted(); }
  };
  recognition.onresult=function(ev){
    // Android 會把「到目前為止的整句」不斷重複回傳，而且中途可能修正個別的字
    // （例如先聽成 Wild 後來改成 while），所以改用「開頭前兩個字相同」來判斷：
    // 開頭相同 → 同一句的修訂快照，保留字數較多的那份；不同 → 才是新內容，接上
    var sameStart=function(a,b){
      var wa=a.toLowerCase().split(/\s+/), wb=b.toLowerCase().split(/\s+/);
      var n=Math.min(2, wa.length, wb.length);
      if(n===0) return false;
      for(var k=0;k<n;k++){ if(wa[k]!==wb[k]) return false; }
      return true;
    };
    var out="";
    for(var i=0;i<ev.results.length;i++){
      var p=(ev.results[i][0].transcript||"").trim();
      if(!p) continue;
      if(!out){ out=p; }
      else if(sameStart(p, out)){
        // 同一句的新快照 → 保留比較長（比較完整）的版本
        if(p.split(/\s+/).length >= out.split(/\s+/).length){ out=p; }
      }
      else if(out.toLowerCase().indexOf(p.toLowerCase())>=0){ /* 已包含 → 略過 */ }
      else{ out=(out+" "+p).trim(); }
    }
    lastTranscript=out;
    armSilence(SILENCE_MS); // 有新的聲音 → 重新計 4 秒安靜時間
    if(heard){ heard.innerHTML="🗣️ 我聽到：<b>"+esc(fullTranscript())+"</b>"; }
  };
  recognition.onerror=function(ev){
    listening=false; resetMicBtn(); stopRecorder();
    if(ev.error==="not-allowed" || ev.error==="service-not-allowed"){
      micManualStop=true; clearSilence(); hideTimer();
      var w=document.getElementById("micwarn");
      if(w){ w.style.display="block"; }
    }
    // no-speech 等一般錯誤交給 onend 的續錄機制處理
  };
  recognition.onend=function(){
    listening=false; resetMicBtn(); stopRecorder();
    if(state.answered || state.screen!=="q"){ clearSilence(); return; }
    if(!micManualStop){
      // 小朋友停頓造成的自動斷線 → 把文字累積起來，馬上續錄
      micAccum=fullTranscript(); lastTranscript="";
      var readTimeUp = (state.mode==="read" && state.readEndsAt && Date.now()>=state.readEndsAt);
      if(!readTimeUp){
        try{ recognition.start(); return; }catch(e){}
      }
    }
    finalizeSpeech();
  };
  try{ recognition.start(); }catch(e){}
}
function stopMic(){ if(recognition){ try{recognition.stop();}catch(e){} } }
function stopMicManual(){
  micManualStop=true; clearSilence();
  if(listening){ stopMic(); } else { finalizeSpeech(); }
}
function resetMicBtn(){
  var b=document.getElementById("mic"), l=document.getElementById("miclabel");
  if(b){ b.className="round-btn btn-mic"; }
  if(l){ l.textContent="按一下開始說"; }
}

/* ================= 評分與批改 ================= */
function grade(said){
  state.answered=true;
  if(state.mode!=="read"){ hideTimer(); } // 朗讀的 1 分鐘總計時在批改時也繼續倒數（和正式考試一樣）
  var inExam = !!state.exam;
  var q=state.qs[state.idx], res, sub, reportHtml="", qText, missed=[];
  if(state.mode==="answer"){
    qText=q.q;
    var hidA=document.getElementById("hiddenq"), lineA=document.getElementById("engline");
    if(hidA){ hidA.style.display="none"; }
    if(lineA){ lineA.style.display="block"; }
    res=scoreAnswer(said, q);
    var spokeSec=Math.min(ANSWER_SEC, Math.max(1, Math.round((Date.now()-micSessionStart)/1000)));
    sub = "你說了 "+res.words+" 個英文字，講了約 "+spokeSec+" 秒";
    reportHtml =
      '<div class="report"><div class="rep-title">📝 批改結果</div>'+
      '<div class="check-line '+(res.full?'ok':'no')+'">'+(res.full?'✅ 有用完整句子回答（3 個字以上）':'❌ 句子太短了，試著說完整的句子')+'</div>'+
      '<div class="check-line '+(res.onTopic?'ok':'no')+'">'+(res.onTopic?'✅ 有回答到問題的重點':'❌ 好像沒有回答到問題，聽聽看參考答案')+'</div>'+
      '<div class="check-line '+(res.enough?'ok':'no')+'">'+(res.enough?'✅ 有講好講滿（8 個字以上）':'❌ 再多說一點！用 because…、and… 把 15 秒講滿')+'</div>'+
      '<div class="sample-box">💡 參考答案：<b>'+esc(q.sample)+'</b><button class="btn-say" id="saysample">🔊 聽</button><br><span style="font-size:12.5px;color:#8FA9C0;">照這樣說之後，再加一句 because… 或 and I also…，分數會更高！</span></div>'+
      '</div>';
  }else{
    qText=q;
    res=scoreRepeat(q, said);
    missed=res.missed;
    var line=document.getElementById("engline"), hid=document.getElementById("hiddenq");
    if(hid){ hid.style.display="none"; }
    if(line){
      line.style.display="block";
      var spans=line.querySelectorAll(".w");
      for(var i=0;i<spans.length;i++){ spans[i].className="w "+(res.marks[i]?"hit":"miss"); }
    }
    sub = "唸對 "+Math.round(res.pct*100)+"% 的字（綠色是唸對的字）";
    var rep = '<div class="report"><div class="rep-title">📝 批改結果</div>';
    if(res.missed.length===0){
      rep += '<span class="chip mint">🌟 全部唸對，沒有漏字！</span>';
    }else{
      rep += '<div class="rep-row"><span class="rep-label">要加強的字（點一下可以聽發音）：</span>';
      for(var mi=0;mi<res.missed.length;mi++){
        rep += '<button class="chip miss-chip" data-w="'+esc(res.missed[mi])+'">'+esc(res.missed[mi])+' 🔊</button>';
      }
      rep += '</div>';
    }
    if(res.extra.length>0){
      rep += '<div class="rep-row"><span class="rep-label">我聽到多唸或唸成別的字：</span>';
      for(var ei=0;ei<res.extra.length;ei++){
        rep += '<span class="chip gray">'+esc(res.extra[ei])+'</span>';
      }
      rep += '</div>';
    }
    rep += '</div>';
    reportHtml = rep;
  }
  state.results[state.idx] = { q:qText, said:said, stars:res.stars, missed:missed };
  state.stars+=res.stars; state.totalStars+=res.stars; saveTotalStars();
  var msg=fbText(res.stars);
  var starHtml="";
  for(var s=0;s<3;s++){ starHtml+='<span class="'+(s<res.stars?"":"off")+'">⭐</span>'; }
  document.getElementById("fb").innerHTML=
    '<div class="stars">'+starHtml+'</div>'+
    '<div class="fb-msg">'+msg[0]+'</div>'+
    '<div class="fb-sub">'+(sub||msg[1])+'</div>'+
    '<div class="playback-row">'+
      (recorderDisabled?'':'<button class="btn-play" id="myrec" disabled>▶️ 聽自己的錄音</button>')+
      (state.mode!=="answer"?'<button class="btn-play demo" id="demorec">🔊 聽示範比較</button>':'')+
    '</div>'+
    reportHtml;
  var mrBtn=document.getElementById("myrec");
  if(mrBtn){
    if(lastAudioURL){ mrBtn.disabled=false; }
    mrBtn.onclick=playRecording;
  }
  var dm=document.getElementById("demorec");
  if(dm){ dm.onclick=function(){ speak(qText); }; }
  var sayBtn=document.getElementById("saysample");
  if(sayBtn){ sayBtn.onclick=function(){ speak(q.sample); }; }
  var chips=document.querySelectorAll(".miss-chip");
  Array.prototype.forEach.call(chips, function(c){
    c.onclick=function(){ speak(c.getAttribute("data-w"), 0.7); };
  });
  var last = state.idx===state.qs.length-1;
  var nextLabel;
  if(inExam){
    nextLabel = !last ? "下一題 →" :
      (state.mode==="repeat" ? "進入第二部分 朗讀 →" :
       state.mode==="read" ? "進入第三部分 回答問題 →" : "看成績單 🏁");
    document.getElementById("nextrow").innerHTML=
      '<button class="btn-main" id="next">'+nextLabel+'</button>';
  }else{
    nextLabel = last ? "看成績 🏁" : "下一題 →";
    document.getElementById("nextrow").innerHTML=
      '<button class="btn-ghost" id="retry">再試一次</button>'+
      '<button class="btn-main" id="next">'+nextLabel+'</button>';
    document.getElementById("retry").onclick=function(){
      state.stars-=res.stars; state.totalStars-=res.stars; saveTotalStars();
      renderQuestion();
    };
  }
  document.getElementById("next").onclick=function(){
    if(last){
      if(inExam){ examNextPart(); } else { renderFinish(); }
    } else { state.idx++; renderQuestion(); }
  };
  if(res.stars===3){ speak("Great job!",1); }
  else if(res.stars>=1){ speak("Good try!",1); }
}

/* ================= 結算（單部分練習） ================= */
function renderFinish(){
  state.screen="finish";
  hideTimer();
  var max=state.qs.length*3, pct=state.stars/max;
  var face = pct>=0.8?"🏆":pct>=0.5?"🎉":"🌱";
  var word = pct>=0.8?"超級厲害！":pct>=0.5?"表現很棒！":"每天練一點，會越來越棒！";

  var sumHtml='<div class="summary"><h3>📋 本回合批改總表</h3>';
  var weakSet={}, weakList=[];
  for(var i=0;i<state.qs.length;i++){
    var r=state.results[i];
    var starTxt="";
    if(r){ for(var s=0;s<3;s++){ starTxt+= s<r.stars ? "⭐" : "☆"; } }
    var qLabel = r ? r.q : (state.mode==="answer" ? state.qs[i].q : state.qs[i]);
    if(qLabel.length>60){ qLabel = qLabel.substring(0,60)+"…"; }
    sumHtml+='<div class="sum-item">'+
      '<span class="sum-stars">'+(r?starTxt:"—")+'</span>'+
      '<div class="sum-q">'+(i+1)+'. '+esc(qLabel)+'</div>'+
      (r ? (r.said?'<div class="sum-said">你說：'+esc(r.said)+'</div>':'') : '<div class="sum-said">（沒有作答）</div>')+
      '</div>';
    if(r&&r.missed){
      for(var w=0;w<r.missed.length;w++){
        var key=r.missed[w].toLowerCase();
        if(!weakSet[key]){ weakSet[key]=true; weakList.push(r.missed[w]); }
      }
    }
  }
  sumHtml+='</div>';
  var weakHtml="";
  if(weakList.length>0){
    weakHtml='<div class="weak-box"><b>🔍 需要加強的單字（點一下聽發音）：</b>';
    for(var k=0;k<weakList.length;k++){
      weakHtml+='<button class="chip weak-chip" data-w="'+esc(weakList[k])+'">'+esc(weakList[k])+' 🔊</button>';
    }
    weakHtml+='</div>';
  }else if(state.mode!=="answer"){
    weakHtml='<div class="weak-box"><b>🌟 沒有需要加強的單字，太厲害了！</b></div>';
  }

  // 存入進步紀錄
  saveHistoryRecord({
    t:Date.now(), type:"practice", mode:state.mode,
    round:ROUNDS[state.round].name, stars:state.stars, max:max, missed:weakList
  });

  h(
    '<div class="finish">'+
      '<div class="big">'+face+'</div>'+
      '<h2>'+word+'</h2>'+
      '<p>'+esc(ROUNDS[state.round].name)+' · '+esc(BANK[state.mode].name)+'<br>這一回合得到 <b>'+state.stars+'</b> / '+max+' 顆星星<br>總共收集了 <b>'+state.totalStars+'</b> 顆 ⭐</p>'+
      '<div class="next-row">'+
        '<button class="btn-ghost" id="again">'+(state.singleQi!=null?"再練這一題":"再練這一回")+'</button>'+
        '<button class="btn-ghost" id="pick">選其他題目</button>'+
        '<button class="btn-main" id="home">回首頁</button>'+
      '</div>'+
      sumHtml+weakHtml+
    '</div>'
  );
  document.getElementById("again").onclick=function(){
    if(state.singleQi!=null){ startSingle(state.mode, state.round, state.singleQi); }
    else{ startRound(state.mode, state.round); }
  };
  document.getElementById("pick").onclick=function(){ renderQuestionPick(state.mode, state.round); };
  document.getElementById("home").onclick=renderHome;
  var chips=document.querySelectorAll(".weak-chip");
  Array.prototype.forEach.call(chips, function(c){
    c.onclick=function(){ speak(c.getAttribute("data-w"), 0.7); };
  });
  speak("Well done! You did a great job!",1);
}

/* ================= 進步紀錄頁 ================= */
function renderHistory(){
  state.screen="history";
  hideTimer(); stopMic();
  var hst=loadHistory();
  var modeNames={intro:"自我介紹",repeat:"複誦",read:"朗讀",answer:"回答問題"};
  // 統計
  var examCount=0, practiceCount=0, weakCount={};
  for(var i=0;i<hst.length;i++){
    if(hst[i].type==="exam"){ examCount++; } else { practiceCount++; }
    if(hst[i].missed){
      for(var w=0;w<hst[i].missed.length;w++){
        var k=hst[i].missed[w].toLowerCase();
        weakCount[k]=(weakCount[k]||0)+1;
      }
    }
  }
  // 最常漏掉的字 Top 10
  var weakArr=[];
  for(var key in weakCount){ weakArr.push({w:key, n:weakCount[key]}); }
  weakArr.sort(function(a,b){ return b.n-a.n; });
  weakArr=weakArr.slice(0,10);
  var weakHtml="";
  if(weakArr.length>0){
    weakHtml='<div class="weak-box"><b>🔍 最常漏掉的單字（點一下聽發音）：</b>';
    for(var j=0;j<weakArr.length;j++){
      weakHtml+='<button class="chip weak-chip" data-w="'+esc(weakArr[j].w)+'">'+esc(weakArr[j].w)+' ×'+weakArr[j].n+' 🔊</button>';
    }
    weakHtml+='</div>';
  }
  // 紀錄清單（最新在上，最多顯示 30 筆）
  var listHtml="";
  var recent=hst.slice(-30).reverse();
  for(var r=0;r<recent.length;r++){
    var rec=recent[r];
    if(rec.type==="exam"){
      listHtml+='<div class="hist-item exam-rec">'+
        '<span class="hi-stars">'+rec.stars+' / '+rec.max+' ⭐</span>'+
        '<div class="hi-title">🏁 正式模擬考 · '+esc(rec.round)+'</div>'+
        '<div class="hi-date">'+fmtDate(rec.t)+' · 自介 '+rec.parts.intro+'｜複誦 '+rec.parts.repeat+'｜朗讀 '+rec.parts.read+'｜問答 '+rec.parts.answer+'</div>'+
        '</div>';
    }else{
      listHtml+='<div class="hist-item">'+
        '<span class="hi-stars">'+rec.stars+' / '+rec.max+' ⭐</span>'+
        '<div class="hi-title">'+(modeNames[rec.mode]||rec.mode)+(rec.round&&rec.round!=="—"?' · '+esc(rec.round):'')+'</div>'+
        '<div class="hi-date">'+fmtDate(rec.t)+(rec.missed&&rec.missed.length?' · 漏字 '+rec.missed.length+' 個':'')+'</div>'+
        '</div>';
    }
  }
  if(!listHtml){
    listHtml='<div class="hist-empty">還沒有練習紀錄，<br>快去練第一回吧！🦉</div>';
  }
  h(
    '<div class="topbar"><button class="btn-back" id="back">← 回首頁</button>'+
    (hst.length?'<button class="btn-back" id="clear" style="color:#C0392B;">清除紀錄</button>':'')+
    '</div>'+
    '<div class="home-head" style="margin-top:0;"><h1 style="font-size:24px;">📈 我的進步紀錄</h1><p>紀錄存在這台裝置的瀏覽器裡</p></div>'+
    '<div class="hist-stats">'+
      '<div class="hist-stat"><b>'+practiceCount+'</b><span>練習次數</span></div>'+
      '<div class="hist-stat"><b>'+examCount+'</b><span>模擬考次數</span></div>'+
      '<div class="hist-stat"><b>'+state.totalStars+'</b><span>累積星星 ⭐</span></div>'+
    '</div>'+
    weakHtml+
    '<div style="margin-top:14px;">'+listHtml+'</div>'
  );
  document.getElementById("back").onclick=renderHome;
  var clearBtn=document.getElementById("clear");
  if(clearBtn){
    clearBtn.onclick=function(){
      if(confirm("確定要清除所有練習紀錄和星星嗎？清掉就找不回來囉！")){
        try{
          localStorage.removeItem("gept_history");
          localStorage.removeItem("gept_stars");
        }catch(e){}
        state.totalStars=0;
        renderHistory();
      }
    };
  }
  var chips=document.querySelectorAll(".weak-chip");
  Array.prototype.forEach.call(chips, function(c){
    c.onclick=function(){ speak(c.getAttribute("data-w"), 0.7); };
  });
}

/* 預先載入語音列表 */
if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged=function(){}; window.speechSynthesis.getVoices(); }
renderHome();
